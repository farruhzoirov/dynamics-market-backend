name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: SSH to Server and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            if [ ! -d "/root/dynamics-market-backend" ]; then
              git clone https://github.com/farruhzoirov/dynamics-market-backend.git /root/dynamics-market-backend
            fi

            cd /root/dynamics-market-backend
            git reset --hard HEAD
            git pull origin main

            {
              echo "PORT=${{ secrets.PORT }}"
              echo "MONGODB_URI=${{ secrets.MONGODB_URI }}"
              echo "REDIS_HOST=${{ secrets.REDIS_HOST }}"
              echo "REDIS_PORT=${{ secrets.REDIS_PORT }}"
              echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
              echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}"
              echo "AMOCRM_REDIRECT_URL=${{ secrets.AMOCRM_REDIRECT_URL }}"
              echo "AMOCRM_DOMAIN=${{ secrets.AMOCRM_DOMAIN }}"
              echo "AMOCRM_CLIENT_SECRET=${{ secrets.AMOCRM_CLIENT_SECRET }}"
              echo "AMOCRM_CLIENT_ID=${{ secrets.AMOCRM_CLIENT_ID }}"
              echo "AMOCRM_CODE=${{ secrets.AMOCRM_CODE }}"
              echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}"
              echo "ADMIN_CHAT_ID=${{ secrets.ADMIN_CHAT_ID }}"
              echo "ADMIN_USER_ID=${{ secrets.ADMIN_USER_ID }}"
              echo "TOPIC_ID=${{ secrets.TOPIC_ID }}"
              echo "SWAGGER_PASSWORD=${{ secrets.SWAGGER_PASSWORD }}"
            } > .env

            docker compose down app
            docker compose up -d --build app
